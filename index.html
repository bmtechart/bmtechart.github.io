<!DOCTYPE HTML>
<html>
	<head>
		<title>Brian Murphy Portfolio</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		
		<!-- Fonts & Colours -->
		<link rel="stylesheet" href="assets/css/theme.css" />

		<!-- Animations & Blends -->
		<link rel="stylesheet" href="assets/css/animations.css" />

		<!-- Desktop/Mobile Layout -->
		<link rel="stylesheet" href="assets/css/layout.css" />

		<!-- Portfolio Widgets -->
		<link rel="stylesheet" href="assets/css/portfolio.css"/>

		<!-- Font Imports -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
	
		<script src="assets/js/main.js" defer></script>
		
	</head>
	

	<header>
		<div class="hero-content">
			<div class="hero-slide active" id="reel">
				<video autoplay loop muted id="hero-video">
					<source src="assets/reels/test-video.mp4">
				</video>
			</div>
			<div class="hero-slide" id="slide-portfolio">
				<div class="portfolio-grid">
					<div class = "portfolio-item">
						<img src="assets/images/moss.jpg" alt="Moss" data-url="dummy.html">
						<div class="portfolio-overlay">
							<h3>Procedural Moss</h3>
						</div>
					</div>
					
					<div class = "portfolio-item">
						<img src="assets/images/rock.jpg" alt="Rock" data-url="dummy.html">
						<div class="portfolio-overlay">
							<h3>Procedural Rocks</h3>
						</div>
					</div>
				</div>
			</div>

			<div class="hero-slide" id="slide-contact">
				<h1>Contact Me</h1>
				<p>Reach out via email or social media</p>
			</div>
		</div>
		
	</header>


	<div class="modal" id="modal">
		<div class="modal-content">
			<button class = "modal-close" aria-label="Close">&times;</button>
			<div id="modalContent"></div>
		</div>
	</div>

	<!-- Navbar inside header for overlay -->
	<div class="nav-background">
		<div class="navbar-wrapper">
		<div class="logo-wrapper">
			<h1>Brian Murphy</h1>
			<p>Technical Artist</p>
		</div>

		<div class="nav-links-wrapper">
			<ul class="nav-links" id="navLinks">
				<li><a href="#home" id="btn-home" data-target="reel">Home</a></li>
				<li><a href="#portfolio" id="btn-about" data-target="slide-contact">Contact</a></li>
				<li><a href="#contact" id="btn-portfolio" data-target="slide-portfolio">Portfolio</a></li>
			</ul>
		</div>
		</div>
	</div>
</html>
